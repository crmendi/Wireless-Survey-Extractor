name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --add-data "icon.ico;." --add-data "icon.png;." --icon="icon.ico" -n "wireless_survey_extractor" wireless_survey_extractor.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireless_survey_extractor-exe
          path: dist/wireless_survey_extractor.exe
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wireless_survey_extractor.exe
